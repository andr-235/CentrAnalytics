services:
  postgres:
    image: "postgres:latest"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-centranalytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - telegram_tdlib_data:/app/.tdlib
    environment:
      JWT_SECRET: ${JWT_SECRET:-ZGV2LW9ubHktand0LXNlY3JldC1yZXBsYWNlLW1lLXdpdGgtZW52}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-centranalytics}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TELEGRAM_USER_ENABLED: ${TELEGRAM_USER_ENABLED}
      TELEGRAM_USER_API_ID: ${TELEGRAM_USER_API_ID}
      TELEGRAM_USER_API_HASH: ${TELEGRAM_USER_API_HASH}
      TELEGRAM_USER_DATABASE_DIR: ${TELEGRAM_USER_DATABASE_DIR:-/app/.tdlib/db}
      TELEGRAM_USER_FILES_DIR: ${TELEGRAM_USER_FILES_DIR:-/app/.tdlib/files}
      TELEGRAM_USER_SYSTEM_LANGUAGE_CODE: ${TELEGRAM_USER_SYSTEM_LANGUAGE_CODE:-en}
      TELEGRAM_USER_DEVICE_MODEL: ${TELEGRAM_USER_DEVICE_MODEL:-CentrAnalytics}
      TELEGRAM_USER_SYSTEM_VERSION: ${TELEGRAM_USER_SYSTEM_VERSION:-server}
      TELEGRAM_USER_APPLICATION_VERSION: ${TELEGRAM_USER_APPLICATION_VERSION:-1.0.0}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  telegram_tdlib_data:
