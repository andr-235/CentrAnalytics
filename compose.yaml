services:
  postgres:
    image: "postgres:17"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-centranalytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: "redis:7-alpine"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-centranalytics}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TELEGRAM_GATEWAY_INGESTION_ENABLED: ${TELEGRAM_GATEWAY_INGESTION_ENABLED:-false}
      TELEGRAM_GATEWAY_INGESTION_INTERNAL_TOKEN: ${TELEGRAM_GATEWAY_INGESTION_INTERNAL_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

