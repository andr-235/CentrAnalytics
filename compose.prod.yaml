services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-centranalytics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-centranalytics}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:?APP_IMAGE must be set for production deployments}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      telegram-auth-gateway:
        condition: service_started
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-centranalytics}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

  centranalytics-tgproxy:
    image: ${TELEGRAM_PROXY_IMAGE:-ghcr.io/xtls/xray-core:latest}
    restart: unless-stopped
    command: ["run", "-c", "/etc/xray/config.json"]
    volumes:
      - ${TELEGRAM_PROXY_CONFIG_PATH:-./telegram-proxy/config.json}:/etc/xray/config.json:ro

  telegram-auth-gateway:
    image: ${TELEGRAM_AUTH_GATEWAY_IMAGE:?TELEGRAM_AUTH_GATEWAY_IMAGE must be set for production deployments}
    restart: unless-stopped
    depends_on:
      - centranalytics-tgproxy
    env_file:
      - .env
    expose:
      - "8091"
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?TELEGRAM_API_ID must be set}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?TELEGRAM_API_HASH must be set}
      TELEGRAM_AUTH_DATA_DIR: /data
      TELEGRAM_SOCKS5_PROXY_ENABLED: ${TELEGRAM_AUTH_GATEWAY_PROXY_ENABLED:-false}
      TELEGRAM_SOCKS5_PROXY_HOST: ${TELEGRAM_AUTH_GATEWAY_PROXY_HOST:-}
      TELEGRAM_SOCKS5_PROXY_PORT: ${TELEGRAM_AUTH_GATEWAY_PROXY_PORT:-1080}
      TELEGRAM_SOCKS5_PROXY_USERNAME: ${TELEGRAM_AUTH_GATEWAY_PROXY_USERNAME:-}
      TELEGRAM_SOCKS5_PROXY_PASSWORD: ${TELEGRAM_AUTH_GATEWAY_PROXY_PASSWORD:-}
      TELEGRAM_COLLECTOR_ENABLED: ${TELEGRAM_COLLECTOR_ENABLED:-true}
      BACKEND_INGESTION_BASE_URL: ${BACKEND_INGESTION_BASE_URL:-http://app:8080}
      BACKEND_INGESTION_INTERNAL_TOKEN: ${TELEGRAM_GATEWAY_INGESTION_INTERNAL_TOKEN:?TELEGRAM_GATEWAY_INGESTION_INTERNAL_TOKEN must be set}
    volumes:
      - telegram_auth_gateway_data:/data

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE must be set for production deployments}
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${FRONTEND_PORT:-18080}:80"

volumes:
  postgres_data:
  telegram_auth_gateway_data:
