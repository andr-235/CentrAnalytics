name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: "26"
  NODE_VERSION: "22"

jobs:
  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      telegram_gateway: ${{ steps.filter.outputs.telegram_gateway }}
      deploy: ${{ steps.filter.outputs.deploy }}
      anything: ${{ steps.summary.outputs.anything }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'pom.xml'
              - 'Dockerfile'
              - 'mvnw'
              - '.mvn/**'
            frontend:
              - 'frontend/**'
            telegram_gateway:
              - 'telegram-auth-gateway/**'
            deploy:
              - 'compose.prod.yaml'
              - '.github/workflows/ci-cd.yml'
              - '.env.example'
              - 'README.md'

      - name: Summarize change set
        id: summary
        run: |
          if [ "${{ steps.filter.outputs.backend }}" = "true" ] || [ "${{ steps.filter.outputs.frontend }}" = "true" ] || [ "${{ steps.filter.outputs.telegram_gateway }}" = "true" ] || [ "${{ steps.filter.outputs.deploy }}" = "true" ]; then
            echo "anything=true" >> "$GITHUB_OUTPUT"
          else
            echo "anything=false" >> "$GITHUB_OUTPUT"
          fi

  test_backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw test

  test_frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  test_telegram_gateway:
    name: Test Telegram Gateway
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.telegram_gateway == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: telegram-auth-gateway/package-lock.json

      - name: Install gateway dependencies
        working-directory: telegram-auth-gateway
        run: npm ci

      - name: Run gateway tests
        working-directory: telegram-auth-gateway
        run: npm test

      - name: Build gateway
        working-directory: telegram-auth-gateway
        run: npm run build

  build_backend:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - test_backend
    if: github.event_name != 'pull_request' && needs.detect_changes.outputs.backend == 'true'
    outputs:
      image_ref: ${{ steps.image_meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute backend image metadata
        id: image_meta
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          image_name="ghcr.io/${owner_lc}/centranalytics"
          image_tag="sha-${GITHUB_SHA}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_name:$image_tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_meta.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.image_meta.outputs.image_tag }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_frontend:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - test_frontend
    if: github.event_name != 'pull_request' && needs.detect_changes.outputs.frontend == 'true'
    outputs:
      image_ref: ${{ steps.image_meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute frontend image metadata
        id: image_meta
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          image_name="ghcr.io/${owner_lc}/centranalytics-frontend"
          image_tag="sha-${GITHUB_SHA}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_name:$image_tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_meta.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.image_meta.outputs.image_tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_telegram_gateway:
    name: Build and Push Telegram Gateway Image
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - test_telegram_gateway
    if: github.event_name != 'pull_request' && needs.detect_changes.outputs.telegram_gateway == 'true'
    outputs:
      image_ref: ${{ steps.image_meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute gateway image metadata
        id: image_meta
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          image_name="ghcr.io/${owner_lc}/centranalytics-telegram-auth-gateway"
          image_tag="sha-${GITHUB_SHA}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_name:$image_tag" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_meta.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.image_meta.outputs.image_tag }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./telegram-auth-gateway
          file: ./telegram-auth-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs:
      - detect_changes
      - build_backend
      - build_frontend
      - build_telegram_gateway
    if: >-
      ${{
        always() &&
        github.event_name != 'pull_request' &&
        needs.detect_changes.outputs.anything == 'true' &&
        (needs.build_backend.result == 'success' || needs.build_backend.result == 'skipped') &&
        (needs.build_frontend.result == 'success' || needs.build_frontend.result == 'skipped') &&
        (needs.build_telegram_gateway.result == 'success' || needs.build_telegram_gateway.result == 'skipped')
      }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          mkdir -p "$DEPLOY_PATH"
          cp compose.prod.yaml "$DEPLOY_PATH/compose.prod.yaml"
          touch "$DEPLOY_PATH/.images.env"

      - name: Update image refs and deploy changed services
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          FRONTEND_HEALTHCHECK_URL: ${{ secrets.FRONTEND_HEALTHCHECK_URL }}
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
          BACKEND_CHANGED: ${{ needs.detect_changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.detect_changes.outputs.frontend }}
          TELEGRAM_GATEWAY_CHANGED: ${{ needs.detect_changes.outputs.telegram_gateway }}
          DEPLOY_CHANGED: ${{ needs.detect_changes.outputs.deploy }}
          NEW_APP_IMAGE: ${{ needs.build_backend.outputs.image_ref }}
          NEW_FRONTEND_IMAGE: ${{ needs.build_frontend.outputs.image_ref }}
          NEW_TELEGRAM_AUTH_GATEWAY_IMAGE: ${{ needs.build_telegram_gateway.outputs.image_ref }}
        run: |
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing $DEPLOY_PATH/.env on runner host" >&2
            exit 1
          fi

          if [ ! -f compose.prod.yaml ]; then
            echo "Missing $DEPLOY_PATH/compose.prod.yaml on runner host" >&2
            exit 1
          fi

          if [ -f .images.env ]; then
            set -a
            . ./.images.env
            set +a
          fi

          if [ "$BACKEND_CHANGED" = "true" ]; then
            APP_IMAGE="$NEW_APP_IMAGE"
          fi

          if [ "$FRONTEND_CHANGED" = "true" ]; then
            FRONTEND_IMAGE="$NEW_FRONTEND_IMAGE"
          fi

          if [ "$TELEGRAM_GATEWAY_CHANGED" = "true" ]; then
            TELEGRAM_AUTH_GATEWAY_IMAGE="$NEW_TELEGRAM_AUTH_GATEWAY_IMAGE"
          fi

          if [ -z "${APP_IMAGE:-}" ]; then
            echo "APP_IMAGE is not set. Backend image ref is required." >&2
            exit 1
          fi

          if [ -z "${FRONTEND_IMAGE:-}" ]; then
            echo "FRONTEND_IMAGE is not set. Frontend image ref is required." >&2
            exit 1
          fi

          if [ -z "${TELEGRAM_AUTH_GATEWAY_IMAGE:-}" ]; then
            echo "TELEGRAM_AUTH_GATEWAY_IMAGE is not set. Gateway image ref is required." >&2
            exit 1
          fi

          cat > .images.env <<EOF
          APP_IMAGE=$APP_IMAGE
          FRONTEND_IMAGE=$FRONTEND_IMAGE
          TELEGRAM_AUTH_GATEWAY_IMAGE=$TELEGRAM_AUTH_GATEWAY_IMAGE
          EOF

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          read_env_value() {
            local key="$1"
            local value
            value="$(sed -n "s/^${key}=//p" .env | tail -n 1)"
            value="${value%\"}"
            value="${value#\"}"
            value="${value%\'}"
            value="${value#\'}"
            printf '%s' "$value"
          }

          compose_cmd=(docker compose --env-file .env --env-file .images.env -f compose.prod.yaml)

          services_to_pull=""
          services_to_up=""

          if [ "$BACKEND_CHANGED" = "true" ]; then
            services_to_pull="$services_to_pull app"
            services_to_up="$services_to_up app"
          fi

          if [ "$FRONTEND_CHANGED" = "true" ]; then
            services_to_pull="$services_to_pull frontend"
            services_to_up="$services_to_up frontend"
          fi

          if [ "$TELEGRAM_GATEWAY_CHANGED" = "true" ]; then
            services_to_pull="$services_to_pull telegram-auth-gateway"
            services_to_up="$services_to_up telegram-auth-gateway"
          fi

          if [ -n "$services_to_pull" ]; then
            pull_attempt=1
            pull_max_attempts=3

            until "${compose_cmd[@]}" pull $services_to_pull; do
              if [ "$pull_attempt" -ge "$pull_max_attempts" ]; then
                echo "Failed to pull updated images after $pull_max_attempts attempts" >&2
                exit 1
              fi

              echo "Image pull attempt $pull_attempt failed, retrying in 10 seconds..." >&2
              pull_attempt=$((pull_attempt + 1))
              sleep 10
            done
          fi

          if [ -n "$services_to_up" ]; then
            "${compose_cmd[@]}" up -d --remove-orphans $services_to_up
          else
            "${compose_cmd[@]}" up -d --remove-orphans
          fi

          frontend_port="$(read_env_value FRONTEND_PORT)"
          if [ -z "$frontend_port" ]; then
            frontend_port="18080"
          fi

          frontend_healthcheck_url="${FRONTEND_HEALTHCHECK_URL:-http://127.0.0.1:${frontend_port}/}"
          backend_healthcheck_url="${BACKEND_HEALTHCHECK_URL:-http://127.0.0.1:${frontend_port}/actuator/health}"

          for _ in $(seq 1 24); do
            if curl -fsS "$frontend_healthcheck_url" >/dev/null && curl -fsS "$backend_healthcheck_url" >/dev/null; then
              exit 0
            fi

            sleep 5
          done

          echo "Health check failed" >&2
          echo "Frontend URL: $frontend_healthcheck_url" >&2
          echo "Backend URL: $backend_healthcheck_url" >&2
          "${compose_cmd[@]}" ps >&2
          exit 1
