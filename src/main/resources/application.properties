spring.application.name=CentrAnalytics

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/centranalytics}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.redis.enabled=false

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Social integrations
integration.enabled=${INTEGRATION_ENABLED:true}
integration.vk.group-id=${VK_GROUP_ID:0}
integration.vk.access-token=${VK_ACCESS_TOKEN:}
integration.vk.user-access-token=${VK_USER_ACCESS_TOKEN:}
integration.vk.api-version=${VK_API_VERSION:5.199}
integration.vk.api-base-url=${VK_API_BASE_URL:https://api.vk.com/method}
integration.vk.fallback-base-url=${VK_FALLBACK_BASE_URL:https://vk.com}
integration.vk.request-timeout=${VK_REQUEST_TIMEOUT:5s}
integration.vk.auto-collection.enabled=${VK_AUTO_COLLECTION_ENABLED:false}
integration.vk.auto-collection.region=${VK_AUTO_COLLECTION_REGION:}
integration.vk.auto-collection.group-search-limit=${VK_AUTO_COLLECTION_GROUP_SEARCH_LIMIT:25}
integration.vk.auto-collection.post-limit=${VK_AUTO_COLLECTION_POST_LIMIT:10}
integration.vk.auto-collection.comment-post-limit=${VK_AUTO_COLLECTION_COMMENT_POST_LIMIT:5}
integration.vk.auto-collection.comment-limit=${VK_AUTO_COLLECTION_COMMENT_LIMIT:20}
integration.vk.auto-collection.collection-mode=${VK_AUTO_COLLECTION_MODE:HYBRID}
integration.vk.auto-collection.fixed-delay-ms=${VK_AUTO_COLLECTION_FIXED_DELAY_MS:900000}
integration.telegram.bot-username=${TELEGRAM_BOT_USERNAME:}
integration.telegram-user.enabled=${TELEGRAM_USER_ENABLED:false}
integration.telegram-user.api-id=${TELEGRAM_USER_API_ID:0}
integration.telegram-user.api-hash=${TELEGRAM_USER_API_HASH:}
integration.telegram-user.database-dir=${TELEGRAM_USER_DATABASE_DIR:.tdlib/db}
integration.telegram-user.files-dir=${TELEGRAM_USER_FILES_DIR:.tdlib/files}
integration.telegram-user.system-language-code=${TELEGRAM_USER_SYSTEM_LANGUAGE_CODE:en}
integration.telegram-user.device-model=${TELEGRAM_USER_DEVICE_MODEL:CentrAnalytics}
integration.telegram-user.system-version=${TELEGRAM_USER_SYSTEM_VERSION:server}
integration.telegram-user.application-version=${TELEGRAM_USER_APPLICATION_VERSION:1.0.0}
integration.telegram-user.proxy-enabled=${TELEGRAM_USER_PROXY_ENABLED:false}
integration.telegram-user.proxy-host=${TELEGRAM_USER_PROXY_HOST:}
integration.telegram-user.proxy-port=${TELEGRAM_USER_PROXY_PORT:0}
integration.telegram-user.proxy-username=${TELEGRAM_USER_PROXY_USERNAME:}
integration.telegram-user.proxy-password=${TELEGRAM_USER_PROXY_PASSWORD:}
integration.telegram-auth-gateway.enabled=${TELEGRAM_AUTH_GATEWAY_ENABLED:false}
integration.telegram-auth-gateway.base-url=${TELEGRAM_AUTH_GATEWAY_BASE_URL:http://telegram-auth-gateway:8091}
integration.telegram-auth-gateway.connect-timeout=${TELEGRAM_AUTH_GATEWAY_CONNECT_TIMEOUT:5s}
integration.telegram-auth-gateway.read-timeout=${TELEGRAM_AUTH_GATEWAY_READ_TIMEOUT:30s}
integration.wappi.webhook-path=${WAPPI_WEBHOOK_PATH:/api/integrations/webhooks/wappi}
