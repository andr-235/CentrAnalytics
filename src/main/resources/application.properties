spring.application.name=CentrAnalytics

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.exposed-headers=Authorization
app.cors.allow-credentials=true

# Webhook Security
integration.webhook.secret=${WEBHOOK_SECRET:}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/centranalytics}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.redis.enabled=false

# Rate Limiting
resilience4j.ratelimiter.instances.authEndpoint.limit-for-period=5
resilience4j.ratelimiter.instances.authEndpoint.limit-refresh-period=60s
resilience4j.ratelimiter.instances.authEndpoint.timeout-duration=0s
resilience4j.ratelimiter.instances.registerEndpoint.limit-for-period=3
resilience4j.ratelimiter.instances.registerEndpoint.limit-refresh-period=60s
resilience4j.ratelimiter.instances.registerEndpoint.timeout-duration=0s

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Social integrations
integration.enabled=${INTEGRATION_ENABLED:true}
integration.vk.group-id=${VK_GROUP_ID:0}
integration.vk.access-token=${VK_ACCESS_TOKEN:}
integration.vk.api-version=${VK_API_VERSION:5.199}
integration.vk.api-base-url=${VK_API_BASE_URL:https://api.vk.com/method}
integration.vk.request-timeout=${VK_REQUEST_TIMEOUT:5s}
integration.vk.minimum-request-interval=${VK_MINIMUM_REQUEST_INTERVAL:1s}
integration.vk.rate-limit-retry-attempts=${VK_RATE_LIMIT_RETRY_ATTEMPTS:5}
integration.vk.rate-limit-retry-base-delay=${VK_RATE_LIMIT_RETRY_BASE_DELAY:2s}
integration.vk.rate-limit-retry-max-delay=${VK_RATE_LIMIT_RETRY_MAX_DELAY:30s}
integration.vk.auto-collection.enabled=${VK_AUTO_COLLECTION_ENABLED:false}
integration.vk.auto-collection.region=${VK_AUTO_COLLECTION_REGION:}
integration.vk.auto-collection.group-search-limit=${VK_AUTO_COLLECTION_GROUP_SEARCH_LIMIT:25}
integration.vk.auto-collection.post-limit=${VK_AUTO_COLLECTION_POST_LIMIT:10}
integration.vk.auto-collection.comment-post-limit=${VK_AUTO_COLLECTION_COMMENT_POST_LIMIT:5}
integration.vk.auto-collection.comment-limit=${VK_AUTO_COLLECTION_COMMENT_LIMIT:20}
integration.vk.auto-collection.fixed-delay-ms=${VK_AUTO_COLLECTION_FIXED_DELAY_MS:900000}
integration.telegram.bot-username=${TELEGRAM_BOT_USERNAME:}
integration.telegram-auth-gateway.enabled=${TELEGRAM_AUTH_GATEWAY_ENABLED:false}
integration.telegram-auth-gateway.base-url=${TELEGRAM_AUTH_GATEWAY_BASE_URL:http://telegram-auth-gateway:8091}
integration.telegram-auth-gateway.connect-timeout=${TELEGRAM_AUTH_GATEWAY_CONNECT_TIMEOUT:5s}
integration.telegram-auth-gateway.read-timeout=${TELEGRAM_AUTH_GATEWAY_READ_TIMEOUT:30s}
integration.telegram-gateway-ingestion.enabled=${TELEGRAM_GATEWAY_INGESTION_ENABLED:false}
integration.telegram-gateway-ingestion.internal-token=${TELEGRAM_GATEWAY_INGESTION_INTERNAL_TOKEN:}
integration.wappi.webhook-path=${WAPPI_WEBHOOK_PATH:/api/integrations/webhooks/wappi}
integration.max.webhook-path=${MAX_WEBHOOK_PATH:/api/integrations/webhooks/wappi/max}
